<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Node — Final Build v4</title>
<style>
  :root {
    --bg: #05070a;
    --card-bg: #0d1117;
    --primary: #4ade80;
    --secondary: #60a5fa;
    --accent: #f59e0b;
    --error: #f87171;
    --text: #e2e8f0;
    --border: #30363d;
    --glow: rgba(74, 222, 128, 0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Inter', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    min-height: 100vh; 
    overflow: hidden;
    background-image: radial-gradient(circle at 50% 50%, #111827 0%, #05070a 100%);
  }

  body::before {
    content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: linear-gradient(#1e2330 1px, transparent 1px), linear-gradient(90deg, #1e2330 1px, transparent 1px);
    background-size: 50px 50px; opacity: 0.15; z-index: -1;
  }

  .screen { display: none; min-height: 100vh; padding: 20px; animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

  /* LOBBY */
  .logo { font-size: 3.5rem; font-weight: 900; margin-bottom: 5px; text-shadow: 0 0 15px var(--glow); letter-spacing: -2px; }
  .logo span.k { color: var(--primary); }
  .logo span.t { color: var(--secondary); }
  
  .panel { 
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 35px; width: 100%; max-width: 480px; 
    box-shadow: 0 25px 60px rgba(0,0,0,0.6); position: relative; overflow: hidden;
  }
  
  .panel::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--primary), var(--secondary)); }

  input { width: 100%; background: #010409; border: 2px solid var(--border); border-radius: 14px; padding: 16px; color: white; font-size: 1rem; margin-bottom: 20px; transition: 0.3s; outline: none; }
  input:focus { border-color: var(--primary); box-shadow: 0 0 12px var(--glow); }
  
  .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
  .role-card { background: #010409; border: 2px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; text-align: center; transition: 0.3s; font-weight: 600; color: #8b949e; }
  .role-card.selected { border-color: var(--primary); background: rgba(74, 222, 128, 0.1); color: var(--primary); }

  .btn { width: 100%; padding: 18px; border-radius: 14px; border: none; font-size: 1rem; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
  .btn-primary { background: var(--primary); color: #05070a; box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3); }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(74, 222, 128, 0.4); }
  .btn-primary:disabled { opacity: 0.3; transform: none; box-shadow: none; }

  /* SCORE BOARD */
  .leaderboard-row { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: #0d1117; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; transition: 0.3s; }
  .leaderboard-row:first-child { border-color: var(--accent); background: rgba(245, 158, 11, 0.1); transform: scale(1.05); }
  .rank { font-weight: 900; width: 30px; color: var(--secondary); }
  .name-area { flex: 1; margin-left: 15px; font-weight: 600; }
  .score-area { color: var(--primary); font-weight: 800; }

  /* INGRESS */
  .ing-box { background: var(--card-bg); border: 2px solid var(--secondary); border-radius: 24px; padding: 45px; width: 100%; max-width: 550px; text-align: center; position: relative; }
  .pod-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 30px 0; }
  .pod-item { background: #010409; border: 1.5px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; text-align: left; transition: 0.2s; font-weight: bold; }
  .pod-item.active { border-color: var(--primary); background: rgba(74, 222, 128, 0.1); color: var(--primary); }

  /* QUESTION SCREEN */
  .q-wrap { width: 100%; max-width: 800px; }
  .q-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 40px; margin-bottom: 25px; border-left: 6px solid var(--primary); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
  
  .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .opt { background: #161b22; border: 2px solid var(--border); border-radius: 18px; padding: 22px; cursor: pointer; transition: 0.2s; font-weight: 600; }
  .opt:hover { border-color: var(--secondary); background: #1c2128; }
  .opt.correct { border-color: var(--primary) !important; background: rgba(74, 222, 128, 0.15); color: var(--primary); }
  .opt.wrong { border-color: var(--error) !important; background: rgba(248, 113, 113, 0.15); color: var(--error); }
  .opt.disabled { pointer-events: none; opacity: 0.6; }

  /* SCORE POPUP */
  .score-popup {
    position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
    font-size: 5rem; font-weight: 900; z-index: 1000; pointer-events: none;
    animation: scoreUp 1.2s forwards; display: none; text-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  @keyframes scoreUp { 0% { opacity: 0; transform: translate(-50%, 0); } 40% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -120px); } }

  .footer { width: 100%; max-width: 800px; display: flex; justify-content: space-between; padding: 22px; background: #0d1117; border-radius: 18px; border: 1px solid var(--border); margin-top: 25px; }
  .http-code { font-weight: bold; padding: 5px 15px; border-radius: 8px; font-size: 0.85rem; font-family: monospace; }
  .c-200 { background: rgba(74, 222, 128, 0.2); color: var(--primary); }
  .c-500 { background: rgba(248, 113, 113, 0.2); color: var(--error); }

</style>
</head>
<body>

<div id="score-anim" class="score-popup"></div>

<div id="lobby" class="screen active">
  <div class="logo"><span class="k">TRIVIA</span><span class="t">NODE</span></div>
  <div style="color:#64748b; font-family:monospace; margin-bottom:30px;">[v4.0.0 Stable Build]</div>
  <div class="panel">
    <input type="text" id="p-name" placeholder="Cluster'a isim ver (Worker ID)" maxlength="14" autocomplete="off">
    <div class="role-grid">
      <div id="role-pod" class="role-card selected" onclick="setRole('pod')">Pod Node</div>
      <div id="role-ingress" class="role-card" onclick="setRole('ingress')">Ingress Manager</div>
    </div>
    <button class="btn btn-primary" onclick="join()">Node Kaydet</button>
    <div id="p-list" style="margin-top: 25px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;"></div>
    <button id="start-btn" class="btn btn-primary" style="margin-top:25px; background:var(--secondary); box-shadow:0 4px 15px rgba(96,165,250,0.3)" disabled onclick="start()">Sistemi Boot Et</button>
  </div>
</div>

<div id="ingress-screen" class="screen">
  <div class="ing-box">
    <div style="font-family: monospace; color: var(--secondary); letter-spacing: 2px; font-size:0.8rem;">> INCOMING_TCP_REQUEST</div>
    <h1 id="ing-cat" style="font-size: 3rem; margin: 15px 0;">...</h1>
    <div id="captain-ui" style="display: none; margin-top: 25px;">
      <div id="pod-grid" class="pod-grid"></div>
      <button id="route-btn" class="btn btn-primary" disabled onclick="confirmRoute()">Yönlendirmeyi Onayla</button>
    </div>
    <div id="auto-ui" style="margin-top: 25px; color: var(--accent); font-family:monospace;">ROUTING_ALGORITHM_ACTIVE...</div>
  </div>
</div>

<div id="question-screen" class="screen">
  <div class="q-wrap">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding:0 10px;">
      <h3 id="q-category" style="color:var(--secondary); letter-spacing:1px;">CAT</h3>
      <div style="text-align:right">
        <div style="font-size:0.7rem; color:#64748b; font-family:monospace;">TTL (TIME TO LIVE)</div>
        <div id="timer-val" style="font-size:1.8rem; font-weight:900; color:var(--secondary);">15</div>
      </div>
    </div>
    <div class="q-card"><h2 id="q-text" style="line-height:1.4">...</h2></div>
    <div id="opt-grid" class="opt-grid"></div>
    <div class="footer">
      <div id="log-text" style="font-family:monospace; font-size:0.9rem;">Status: Listening...</div>
      <div id="http-status" class="http-code">IDLE</div>
    </div>
  </div>
</div>

<div id="result-screen" class="screen">
  <div class="panel" style="max-width: 550px;">
    <div style="text-align:center; margin-bottom:25px;">
      <h1 style="color:var(--primary); font-size:2rem;">CLUSTER REPORT</h1>
      <p style="color:#64748b; font-family:monospace;">Diagnostic sequence complete.</p>
    </div>
    <div id="leaderboard"></div>
    <button class="btn btn-primary" onclick="location.reload()" style="margin-top:30px; background:var(--text); color:var(--bg)">Re-Boot System</button>
  </div>
</div>

<script>
const DB = [
  { c: "Kubernetes", q: "Birden fazla Pod'un trafiğini dengeleyen yapı?", o: ["Service", "Kubelet", "Docker", "Secret"], a: 0 },
  { c: "Azure", q: "Azure'da otomatik ölçeklendirme yapan birim?", o: ["Auto-Scaler", "Storage", "VNET", "Active Directory"], a: 0 },
  { c: "Docker", q: "Uygulamayı tüm bağımlılıkları ile paketleme işlemi?", o: ["Containerization", "Caching", "Debugging", "Linking"], a: 0 },
  { c: "DevOps", q: "Kodun sürekli olarak test edilip yayına alınması?", o: ["CI/CD", "Waterfall", "Binary Search", "Encryption"], a: 0 },
  { c: "Network", q: "L7 yük dengeleme işlemi yapan Kubernetes objesi?", o: ["Ingress", "ConfigMap", "PV", "Namespace"], a: 0 }
];

let players = [], myRole = 'pod', currentQ = 0, qList = [], timer = null, selectedPod = null, isAnswering = false;

function setRole(r) {
  myRole = r;
  document.getElementById('role-pod').classList.toggle('selected', r === 'pod');
  document.getElementById('role-ingress').classList.toggle('selected', r === 'ingress');
}

function join() {
  const input = document.getElementById('p-name');
  const name = input.value.trim();
  if(!name || players.some(p => p.n === name)) return;
  if(myRole === 'ingress' && players.some(p => p.r === 'ingress')) return alert("Kaptan zaten var!");
  
  players.push({ n: name, r: myRole, s: 0 });
  renderPlayers();
  
  // Girdiyi Sıfırla ve Odaklan
  input.value = "";
  input.focus();
}

function renderPlayers() {
  document.getElementById('p-list').innerHTML = players.map(p => `<span style="background:#161b22; padding:8px 16px; border-radius:25px; font-size:0.85rem; border:1px solid #30363d; font-weight:600;">${p.r === 'ingress' ? '⇄' : '⬡'} ${p.n}</span>`).join('');
  document.getElementById('start-btn').disabled = players.filter(p => p.r === 'pod').length < 2;
}

function start() {
  qList = [...DB].sort(() => 0.5 - Math.random());
  showIngress();
}

function showIngress() {
  showScreen('ingress-screen');
  const q = qList[currentQ];
  document.getElementById('ing-cat').innerText = q.c;
  const captain = players.find(p => p.r === 'ingress');
  if(captain) {
    document.getElementById('captain-ui').style.display = 'block';
    document.getElementById('auto-ui').style.display = 'none';
    document.getElementById('pod-grid').innerHTML = players.filter(p => p.r === 'pod').map(p => `<div class="pod-item" onclick="pickPod(this, '${p.n}')">${p.n}</div>`).join('');
  } else {
    const pods = players.filter(p => p.r === 'pod');
    const target = pods[currentQ % pods.length].n;
    setTimeout(() => showQuestion(target), 2000);
  }
}

function pickPod(el, name) {
  document.querySelectorAll('.pod-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  selectedPod = name;
  document.getElementById('route-btn').disabled = false;
}

function confirmRoute() { showQuestion(selectedPod); }

function showQuestion(podName) {
  showScreen('question-screen');
  isAnswering = false;
  const q = qList[currentQ];
  document.getElementById('q-category').innerText = q.c;
  document.getElementById('q-text').innerText = q.q;
  document.getElementById('opt-grid').innerHTML = q.o.map((o, i) => `<div class="opt" onclick="answer(${i}, '${podName}')">${o}</div>`).join('');
  startTimer(podName);
}

function startTimer(podName) {
  let left = 15;
  timer = setInterval(() => {
    left--;
    document.getElementById('timer-val').innerText = left;
    if(left <= 0) { clearInterval(timer); answer(-1, podName); }
  }, 1000);
}

function answer(idx, name) {
  if(isAnswering) return;
  isAnswering = true;
  clearInterval(timer);
  document.querySelectorAll('.opt').forEach(el => el.classList.add('disabled'));

  const q = qList[currentQ];
  const isCorrect = idx === q.a;
  
  if(isCorrect) {
    players.find(p => p.n === name).s += 100;
    const cap = players.find(p => p.r === 'ingress');
    if(cap && selectedPod === name) cap.s += 50;
    showScoreAnim("+100", "var(--primary)");
    document.getElementById('opt-grid').children[idx].classList.add('correct');
    updateStatus("200 OK", "Request Processed Successfully", "c-200");
  } else {
    players.find(p => p.n === name).s = Math.max(0, players.find(p => p.n === name).s - 50);
    showScoreAnim("-50", "var(--error)");
    if(idx !== -1) document.getElementById('opt-grid').children[idx].classList.add('wrong');
    document.getElementById('opt-grid').children[q.a].classList.add('correct');
    updateStatus("500 ERROR", idx === -1 ? "Response Timeout" : "Checksum Mismatch", "c-500");
  }

  setTimeout(() => {
    currentQ++;
    if(currentQ < qList.length) showIngress();
    else finish();
  }, 2200);
}

function showScoreAnim(text, color) {
  const anim = document.getElementById('score-anim');
  anim.innerText = text;
  anim.style.color = color;
  anim.style.display = 'block';
  setTimeout(() => anim.style.display = 'none', 1000);
}

function updateStatus(code, log, cls) {
  const s = document.getElementById('http-status');
  s.innerText = code; s.className = `http-code ${cls}`;
  document.getElementById('log-text').innerText = `[LOG]: ${log}`;
}

function finish() {
  showScreen('result-screen');
  players.sort((a,b) => b.s - a.s);
  document.getElementById('leaderboard').innerHTML = players.map((p, i) => `
    <div class="leaderboard-row">
      <span class="rank">#${i+1}</span>
      <span class="name-area">${p.n} <small style="color:#64748b">(${p.r.toUpperCase()})</small></span>
      <span class="score-area">${p.s} PTS</span>
    </div>
  `).join('');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
