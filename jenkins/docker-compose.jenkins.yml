# ============================================================
# Jenkins CI/CD — Docker Compose ile Yerel Çalıştırma
# Jenkins'i yerel bilgisayarınızda Docker üzerinde çalıştırır
# Kullanım: docker-compose -f jenkins/docker-compose.jenkins.yml up -d
# ============================================================

version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins-trivia
    restart: unless-stopped
    ports:
      - "8080:8080"     # Jenkins Web UI
      - "50000:50000"   # Jenkins agent port
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    # Docker CLI'ı Jenkins container'ına ekle
    user: root

volumes:
  jenkins_data:
    driver: local
